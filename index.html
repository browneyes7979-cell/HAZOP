<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환경법령 개정 대응 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#2563eb;--bg:#f0f4f8;--card:#fff;--bd:#dde3ea;--tx:#0f172a;--mu:#64748b;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx)}
.topbar{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}.topbar .logo{font-size:17px;font-weight:900}.topbar .sub{font-size:11px;color:#94a3b8;margin-left:auto}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 80px}
.card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid var(--bd)}
.lbl{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}.lbl::before{content:'';width:3px;height:14px;background:var(--p);border-radius:2px}
.sw{position:relative}.sw::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-top-color:#94a3b8;pointer-events:none}
select{width:100%;padding:13px 42px 13px 16px;border:1.5px solid var(--bd);border-radius:12px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;outline:none;appearance:none;cursor:pointer}select:focus{border-color:var(--p)}select:disabled{opacity:.4}
.type-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}.type-btn{padding:14px 8px;border:2px solid var(--bd);border-radius:14px;background:#fff;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}.type-btn:hover,.type-btn.active{border-color:var(--p);background:#eff6ff}.type-btn .icon{font-size:26px;display:block;margin-bottom:6px}.type-btn .name{font-size:13px;font-weight:900;display:block}.type-btn .desc{font-size:10px;color:var(--mu);display:block;margin-top:2px}
.srow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--mu);margin-bottom:10px}.dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1}.dot.ok{background:#22c55e}.dot.err{background:var(--red)}.dot.ing{background:#f59e0b;animation:p 1.2s infinite}@keyframes p{50%{opacity:.4}}
.run-btn{width:100%;height:58px;border:none;border-radius:14px;background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;box-shadow:0 4px 16px rgba(37,99,235,.3)}.run-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
.msg{border-radius:10px;padding:11px 14px;font-size:13px;margin-top:10px;display:none}.msg.show{display:block}.msg.err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}.msg.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.step{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;color:#1d4ed8;margin-bottom:14px;display:none}.step.show{display:block}
.debug-btn{padding:6px 12px;border:1px solid #475569;border-radius:8px;background:#1e293b;font-size:11px;font-weight:700;color:#94a3b8;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif}.debug-panel{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px;margin-top:10px;display:none;font-family:monospace;font-size:11px;color:#94a3b8;max-height:300px;overflow-y:auto}.debug-panel.show{display:block}
.dash{background:var(--card);border-radius:18px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.08)}.dash-head{background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:20px;color:#fff}.dash-head h2{font-size:18px;font-weight:900;margin-bottom:8px}.dash-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.tag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.cmp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.db-act{display:flex;gap:8px;padding:12px 18px;background:#f8fafc;border-bottom:1px solid var(--bd);flex-wrap:wrap}.ab{padding:7px 12px;border:1.5px solid var(--bd);border-radius:8px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--mu);cursor:pointer}.ab:hover{border-color:var(--p);color:var(--p)}
.stl{font-size:15px;font-weight:900;padding:16px 18px 8px;display:flex;align-items:center;gap:8px}.stl .n{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.sbox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:16px;margin:8px 18px 16px;font-size:14px;line-height:1.8;color:#1e3a5f}
.top3{background:linear-gradient(135deg,#dc2626,#991b1b);border-radius:14px;padding:16px;margin:8px 18px 16px;color:#fff}.top3 h3{font-size:14px;font-weight:900;margin-bottom:12px}.top3-item{background:rgba(255,255,255,.1);border-radius:10px;padding:14px;margin-bottom:10px}.top3-item:last-child{margin-bottom:0}.top3-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}.top3-rank{background:#fff;color:#dc2626;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}.top3-reason{font-size:11px;color:rgba(255,255,255,.7);font-weight:700}.top3-steps{list-style:none;padding:0}.top3-steps li{font-size:13px;line-height:1.8;padding-left:20px;position:relative;font-weight:700}.top3-steps li::before{content:'▸';position:absolute;left:4px;color:#fbbf24}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 18px 16px}.cat-card{border-radius:12px;padding:14px;text-align:center;border:1px solid var(--bd)}.cat-icon{font-size:24px}.cat-name{font-size:12px;font-weight:900;color:var(--mu)}.cat-cnt{font-size:28px;font-weight:900;margin:4px 0}.cat-urg{font-size:11px;font-weight:700;color:var(--red)}
.ctbl{width:100%;border-collapse:collapse;font-size:12px}.ctbl th{background:#1e293b;color:#fff;padding:8px 10px;font-weight:700;text-align:left;font-size:11px}.ctbl td{padding:10px;border-bottom:1px solid #f1f5f9;vertical-align:top;line-height:1.6}.ctbl tr:hover td{background:#f8fafc}.vt{font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px}.vt-강화{background:#fef2f2;color:#dc2626}.vt-완화{background:#f0fdf4;color:#16a34a}.vt-신설{background:#eff6ff;color:#1d4ed8}.vt-삭제{background:#fdf4ff;color:#7c3aed}
.exec{background:#fff;border:1.5px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden}.exec-top{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--bd);flex-wrap:wrap}.exec-name{font-size:14px;font-weight:900}.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}.b-h{background:#fef2f2;color:#dc2626}.b-m{background:#fffbeb;color:#d97706}.b-l{background:#f0fdf4;color:#16a34a}.b-capex{background:#fce7f3;color:#be185d}.b-prod{background:#fef3c7;color:#92400e}.b-cat{background:#eff6ff;color:#1d4ed8}
.exec-body{padding:14px;display:grid;gap:10px}.exec-row{display:flex;gap:6px;font-size:13px;line-height:1.6}.exec-lbl{font-size:10px;font-weight:900;color:#fff;background:var(--mu);padding:2px 8px;border-radius:4px;min-width:52px;text-align:center;flex-shrink:0;height:fit-content;margin-top:2px}.exec-val{flex:1}
.exec-action{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7;color:#1e40af;font-weight:700}.exec-trigger{background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:#854d0e;display:inline-block;margin-bottom:6px}
.risk{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;font-weight:700}
.issue{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:10px}.issue-title{font-size:13px;font-weight:900;color:#92400e;margin-bottom:8px}.issue-row{font-size:12px;line-height:1.7;color:#78350f;margin-bottom:4px}.issue-lbl{font-weight:900}
.reason{border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}.reason-t{font-size:12px;font-weight:900;color:var(--mu);margin-bottom:6px}.reason-v{font-size:13px;line-height:1.7}
.dash-foot{padding:14px 18px;background:#f8fafc;border-top:1px solid var(--bd);font-size:11px;color:var(--mu)}
</style>
</head>
<body>
<div class="topbar"><div class="logo">📋 환경법령 개정 대응 대시보드</div><div class="sub">여수 석유화학공장 환경안전팀</div></div>
<div class="wrap">
<div class="card"><div class="lbl">1. 대상 법령 선택</div><div class="sw"><select id="lawSel" onchange="onLawChange()"><option value="">법령을 선택하세요</option><option value="대기환경보전법">대기환경보전법</option><option value="물환경보전법">물환경보전법</option><option value="화학물질관리법">화학물질관리법</option><option value="화학물질 등록 및 평가법">화학물질 등록 및 평가법</option><option value="산업안전보건법">산업안전보건법</option><option value="위험물안전관리법">위험물안전관리법</option><option value="소음·진동관리법">소음·진동관리법</option><option value="악취방지법">악취방지법</option><option value="토양환경보전법">토양환경보전법</option><option value="환경영향평가법">환경영향평가법</option></select></div></div>
<div class="card"><div class="lbl">2. 법령 종류 선택</div><div class="type-btns"><button class="type-btn active" id="btn-law" onclick="setType('law')"><span class="icon">📜</span><span class="name">법</span><span class="desc">법률 본문</span></button><button class="type-btn" id="btn-decree" onclick="setType('decree')"><span class="icon">📋</span><span class="name">시행령</span><span class="desc">대통령령</span></button><button class="type-btn" id="btn-rule" onclick="setType('rule')"><span class="icon">📄</span><span class="name">시행규칙</span><span class="desc">부령</span></button></div></div>
<div class="card"><div class="srow"><div class="dot" id="dot"></div><span id="gasMsg">법령 선택 후 자동 조회</span></div><div class="lbl">3. 시행일자 선택</div><div class="sw"><select id="dateSel" disabled><option>법령 및 종류를 먼저 선택</option></select></div><div class="msg err" id="errBox"></div><div class="msg warn" id="warnBox"></div><button class="debug-btn" id="debugBtn" style="display:none" onclick="runDebug()">🔍 API 진단</button><div class="debug-panel" id="debugPanel"></div></div>
<button class="run-btn" id="runBtn" onclick="run()">⚡ 개정 내용 분석 실행</button><div class="step" id="stepBox"></div>
<div class="dash" id="dash" style="display:none"><div class="dash-head"><h2 id="dTitle"></h2><div class="dash-tags" id="dTags"></div><div class="cmp" id="dCmp"></div></div><div class="db-act"><button class="ab" onclick="window.print()">🖨️ 인쇄</button></div><div id="dashBody"></div><div class="dash-foot"><span id="dMeta"></span></div></div>
</div>
<script>
var GAS="https://script.google.com/macros/s/AKfycbyTeAa__QO8OBb6rmHyeCCEFDpQrjRwyVpOXVP-ixyka5UgyIXm5j9LKrrh_AiVY30PFw/exec";
var lawName="",lawType="law",allDates=[],mstMap={};
function jsonp(p,cb,ms){return new Promise(function(res,rej){var old=document.getElementById("__"+cb);if(old)old.remove();var t=setTimeout(function(){delete window[cb];rej(new Error("응답없음("+ms/1000+"초)"));},ms);window[cb]=function(d){clearTimeout(t);delete window[cb];res(d);};var s=document.createElement("script");s.id="__"+cb;s.src=GAS+"?"+new URLSearchParams(p).toString();s.onerror=function(){clearTimeout(t);delete window[cb];rej(new Error("GAS 연결 실패"));};document.body.appendChild(s);});}
function setType(t){lawType=t;["law","decree","rule"].forEach(function(k){document.getElementById("btn-"+k).classList.toggle("active",k===t);});if(lawName)loadDates();}
function onLawChange(){lawName=document.getElementById("lawSel").value;allDates=[];mstMap={};document.getElementById("dateSel").innerHTML="<option>선택</option>";document.getElementById("dateSel").disabled=true;["debugPanel","debugBtn"].forEach(function(id){document.getElementById(id).style.display="none";});hideMsg("warnBox");hideMsg("errBox");if(lawName)loadDates();}
async function loadDates(){var sel=document.getElementById("dateSel");hideMsg("errBox");hideMsg("warnBox");sel.disabled=true;sel.innerHTML="<option>조회 중...</option>";setDot("ing","조회 중...");try{var d=await jsonp({action:"dates",lawName:lawName,lawType:lawType,callback:"__cbd"},"__cbd",30000);if(d.error){setDot("err","오류");showErr(d.error);document.getElementById("debugBtn").style.display="inline-block";return;}if(d.debug){document.getElementById("warnBox").innerHTML="<b>서버:</b> "+esc(d.debug);document.getElementById("warnBox").classList.add("show");}if(!d.dates||!d.dates.length){setDot("ok","0건");sel.innerHTML="<option>시행일 없음</option>";document.getElementById("debugBtn").style.display="inline-block";return;}allDates=d.dates;mstMap=d.mstMap||{};setDot("ok","✓ "+d.dates.length+"건");sel.innerHTML="<option value=''>시행일 선택 ("+d.dates.length+"건)</option>"+d.dates.map(function(x){return'<option value="'+x+'">'+x.slice(0,4)+"년 "+x.slice(4,6)+"월 "+x.slice(6,8)+"일</option>";}).join("");sel.disabled=false;}catch(ex){setDot("err","실패");showErr(ex.message);document.getElementById("debugBtn").style.display="inline-block";}}
async function runDebug(){var p=document.getElementById("debugPanel");p.innerHTML="<span style='color:#60a5fa'>테스트...</span>";p.classList.add("show");try{var d=await jsonp({action:"debug",lawName:lawName,lawType:lawType,callback:"__cbdbg"},"__cbdbg",60000);p.innerHTML="<pre style='white-space:pre-wrap;color:#e2e8f0'>"+esc(JSON.stringify(d,null,2))+"</pre>";}catch(ex){p.innerHTML="<span style='color:#f87171'>"+esc(ex.message)+"</span>";}}
async function run(){if(!lawName)return alert("법령 선택");var dt=document.getElementById("dateSel").value;if(!dt)return alert("시행일 선택");var btn=document.getElementById("runBtn"),step=document.getElementById("stepBox");btn.disabled=true;btn.innerHTML='<div class="spin"></div>&ensp;AI 분석 중...';document.getElementById("dash").style.display="none";step.classList.add("show");step.textContent="🤖 법 비교 → 실행지시 변환 중... (최대 120초)";try{var d=await jsonp({action:"analyze",id:mstMap[dt]||"",date:dt,lawName:lawName,lawType:lawType,allDates:JSON.stringify(allDates),callback:"__cba"},"__cba",120000);if(d.error)throw new Error(d.error);if(!d.data)throw new Error("결과 없음");renderAll(d);}catch(ex){alert("오류: "+ex.message);}finally{btn.disabled=false;btn.innerHTML="⚡ 개정 내용 분석 실행";step.classList.remove("show");}}
function renderAll(d){var data=d.result?d.result:d,pd=data.data||data,dt=d.date||document.getElementById("dateSel").value;var tl=(d.lawType||lawType)==="decree"?"시행령":(d.lawType||lawType)==="rule"?"시행규칙":"법률";var df=dt.slice(0,4)+"-"+dt.slice(4,6)+"-"+dt.slice(6,8);document.getElementById("dTitle").textContent=(d.lawName||lawName)+" "+tl+" — 실행지시 보고서";document.getElementById("dTags").innerHTML='<span class="tag" style="background:rgba(59,130,246,.3);color:#93c5fd">📅 '+df+'</span>'+(data.hasSource?'<span class="tag" style="background:rgba(34,197,94,.3);color:#86efac">✅ 원문기반</span>':'<span class="tag" style="background:rgba(251,191,36,.3);color:#fde68a">⚠️ 추정포함</span>');var cmp=document.getElementById("dCmp");if(data.prevDate){cmp.innerHTML='<span style="font-weight:900;color:#fbbf24">'+data.prevDateFmt+'</span> <span style="color:#60a5fa">→</span> <span style="font-weight:900;color:#34d399">'+df+'</span>';cmp.style.display="flex";}else cmp.style.display="none";var h='';if(pd.핵심요약)h+='<div class="stl"><span class="n" style="background:#0f172a">①</span>핵심 변경 요약</div><div class="sbox">'+esc(pd.핵심요약)+'</div>';h+=rTop3(pd)+rCat(pd)+rComp(pd)+rExec(pd)+rIss(pd)+rRsn(pd);document.getElementById("dashBody").innerHTML=h;document.getElementById("dMeta").textContent="Groq llama-3.3-70b · "+new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})+(data.tokens?" · "+data.tokens.toLocaleString()+"토큰":"");document.getElementById("dash").style.display="block";setTimeout(function(){document.getElementById("dash").scrollIntoView({behavior:"smooth"});},100);}
function rTop3(d){var t=d.top3||[];if(!t.length)return'';var h='<div class="top3"><h3>🚨 우선 조치 TOP 3</h3>';t.forEach(function(x){h+='<div class="top3-item"><div class="top3-head"><div class="top3-rank">'+x.순위+'</div><div class="top3-reason">'+esc(x.이유||"")+'</div></div>';var steps=x.행동||[];if(typeof steps==="string")steps=[steps];if(steps.length){h+='<ul class="top3-steps">';steps.forEach(function(s){h+='<li>'+esc(s)+'</li>';});h+='</ul>';}h+='</div>';});return h+'</div>';}
function rCat(d){var s=d.summary||{};var cats=[{k:"배출기준",i:"🏭",c:"#dc2626"},{k:"설비",i:"⚙️",c:"#7c3aed"},{k:"서류인허가",i:"📝",c:"#2563eb"},{k:"운영관리",i:"📋",c:"#d97706"}];var h='<div class="cat-grid">';cats.forEach(function(c){var v=s[c.k]||{건수:0,높음:0};h+='<div class="cat-card"><span class="cat-icon">'+c.i+'</span><span class="cat-name">'+c.k+'</span><div class="cat-cnt" style="color:'+c.c+'">'+v.건수+'</div>'+(v.높음?'<span class="cat-urg">긴급 '+v.높음+'건</span>':'')+'</div>';});return h+'</div>';}
function rComp(d){var ch=d.비교표||d.changes||[];if(!ch.length)return'';var h='<div class="stl"><span class="n" style="background:#d97706">②</span>상세 변경 비교표</div><div style="padding:0 18px 16px;overflow-x:auto"><table class="ctbl"><thead><tr><th>구분</th><th>조항</th><th>변경 전</th><th>변경 후</th><th>유형</th><th>실제 의미</th></tr></thead><tbody>';ch.forEach(function(c){h+='<tr><td>'+esc(c.구분||"")+'</td><td style="font-weight:900;color:var(--p);white-space:nowrap">'+esc(c.조항||"")+'</td><td>'+esc(c.변경전||"신규")+'</td><td>'+esc(c.변경후||"-")+'</td><td><span class="vt vt-'+esc(c.변화유형||"")+'">'+esc(c.변화유형||"")+'</span></td><td style="font-size:12px;color:#475569">'+esc(c.의미변화||"")+'</td></tr>';});return h+'</tbody></table></div>';}
function rExec(d){var a=d.실행지시||d.actions||[];if(!a.length)return'';var h='<div class="stl"><span class="n" style="background:#dc2626">③</span>실행지시 ('+a.length+'건)</div><div style="padding:0 18px 16px">';a.forEach(function(c){var uc=c.긴급도==="높음"?"b-h":c.긴급도==="중간"?"b-m":"b-l";h+='<div class="exec"><div class="exec-top"><span class="exec-name">'+esc(c.작업명||c.변경내용||"")+'</span><span class="badge '+uc+'">'+(c.긴급도||"")+'</span><span class="badge b-cat">'+(c.구분||"")+'</span>';if(c.CAPEX)h+='<span class="badge b-capex">💰 CAPEX</span>';if(c.생산영향)h+='<span class="badge b-prod">⚠️ 생산영향</span>';h+='</div><div class="exec-body">';if(c.트리거)h+='<span class="exec-trigger">⚡ '+esc(c.트리거)+'</span>';if(c.구체행동)h+='<div class="exec-action">'+esc(c.구체행동)+'</div>';if(c.적용대상)h+='<div class="exec-row"><span class="exec-lbl">대상</span><div class="exec-val">'+esc(c.적용대상)+'</div></div>';if(c.현재상태)h+='<div class="exec-row"><span class="exec-lbl">현재</span><div class="exec-val">'+esc(c.현재상태)+'</div></div>';h+='<div class="exec-row"><span class="exec-lbl">담당</span><div class="exec-val">'+esc(c.담당||"")+(c.기한?' · <b>기한: '+esc(c.기한)+'</b>':'')+(c.조항?' · '+esc(c.조항):'')+'</div></div>';if(c.리스크)h+='<div class="risk">⚠️ '+esc(c.리스크)+'</div>';h+='</div></div>';});return h+'</div>';}
function rIss(d){var iss=d.해석이슈||[];if(!iss.length)return'';var h='<div class="stl"><span class="n" style="background:#d97706">④</span>해석 이슈 및 주의사항</div><div style="padding:0 18px 16px">';iss.forEach(function(x){h+='<div class="issue"><div class="issue-title">⚠️ '+esc(x.이슈||"")+(x.추가확인?' <span style="background:#dc2626;color:#fff;padding:1px 6px;border-radius:4px;font-size:10px">추가확인필요</span>':'')+'</div>';if(x.판단기준)h+='<div class="issue-row"><span class="issue-lbl">판단기준:</span> '+esc(x.판단기준)+'</div>';if(x.권장대응)h+='<div class="issue-row"><span class="issue-lbl">대응:</span> '+esc(x.권장대응)+'</div>';h+='</div>';});return h+'</div>';}
function rRsn(d){var r=d.변경사유;if(!r)return'';return'<div class="stl"><span class="n" style="background:#64748b">⑤</span>변경사유 vs 실제영향</div><div style="padding:0 18px 16px"><div class="reason"><div class="reason-t">📌 명시된 변경 사유</div><div class="reason-v">'+esc(r.명시된사유||"정보 없음")+'</div></div><div class="reason" style="border-color:#fecaca;background:#fef2f2"><div class="reason-t" style="color:#dc2626">🔍 실제 현장 영향</div><div class="reason-v">'+esc(r.실제영향||"정보 없음")+'</div></div></div>';}
function setDot(s,m){document.getElementById("dot").className="dot "+s;document.getElementById("gasMsg").textContent=m;}
function showErr(h){document.getElementById("errBox").innerHTML=h;document.getElementById("errBox").classList.add("show");}
function hideMsg(id){document.getElementById(id).classList.remove("show");}
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
</body>
</html>
