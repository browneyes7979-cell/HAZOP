<!DOCTYPE html>
<html lang="ko">

        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        }

</head>
<body class="bg-slate-50 min-h-screen pb-12">
    <!-- Header -->
    <header class="bg-blue-900 text-white py-6 shadow-md mb-8">
        <div class="container mx-auto px-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                여수 산단 환경안전 법령 분석 시스템
            </h1>
            <p class="text-blue-200 text-sm mt-1">법제처 실시간 API 기반 신구법 대조 및 AI 실무 액션 가이드</p>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <!-- Search Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">법령명 입력</label>
                    <input type="text" id="lawInput" placeholder="예: 대기환경보전법, 물환경보전법" 
                           class="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">구분</label>
                    <select id="lawType" class="w-full border border-slate-300 p-3 rounded-xl bg-slate-50 outline-none">
                        <option value="law">법률</option>
                        <option value="decree">시행령</option>
                        <option value="rule">시행규칙</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="loadLawHistory()" id="searchBtn" 
                            class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg shadow-blue-200">
                        연혁 조회
                    </button>

            </div>

        <div id="historyContainer" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6 animate-fade-in">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">

                <button onclick="startAnalysis()" id="analyzeBtn"
                        class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-10 rounded-xl transition shadow-lg shadow-emerald-100">

        </div>

        <!-- Loading Indicator -->
        <div id="loader" class="hidden space-y-4 py-12">
            <div class="flex justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600"></div>
            </div>
            <p class="text-center text-slate-600 font-medium">법령 원문을 파싱하여 AI가 분석 중입니다...</p>
        </div>

        <!-- Result Section -->
        <div id="resultView" class="hidden space-y-6">
            <!-- Summary Card -->
            <div id="summaryCard" class="bg-blue-50 border border-blue-100 rounded-2xl p-6"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Change Items -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-amber-50 px-6 py-4 border-b border-amber-100">
                        <h3 class="font-bold text-amber-800 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                            주요 강화/변경 사항
                        </h3>
                    </div>
                    <div id="changeList" class="p-6 text-slate-700 text-sm leading-relaxed space-y-3"></div>
                </div>

                <!-- Action Items -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-emerald-50 px-6 py-4 border-b border-emerald-100">
                        <h3 class="font-bold text-emerald-800 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                            현장 대응 Action Item
                        </h3>
                    </div>
                    <div id="actionList" class="p-6 text-slate-700 text-sm leading-relaxed space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 새로운 GAS 배포 URL
        const ENDPOINT = "https://script.google.com/macros/s/AKfycbwLNP7xvtj-ZmEV7MZ8iCaLJa5H97uT9GXDXo4o5nwwbn5BAjRCVF1BHJ-0l62biKqGPA/exec";

        // JSONP 호출 함수
        function fetchGAS(params) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                params.callback = callbackName;
                
                const qs = Object.keys(params).map(key => `${key}=${encodeURIComponent(params[key])}`).join('&');
                script.src = `${ENDPOINT}?${qs}`;

                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    if (data.error) reject(data.error);
                    else resolve(data);
                };

                script.onerror = () => reject("GAS 엔드포인트 연결 실패");
                document.body.appendChild(script);
            });
        }

        async function loadLawHistory() {
            const lawName = document.getElementById('lawInput').value.trim();
            const lawType = document.getElementById('lawType').value;
            if (!lawName) return alert("법령명을 입력하세요.");

            setLoading(true);
            try {
                const res = await fetchGAS({ action: 'dates', lawName, lawType });
                
                const select = document.getElementById('dateSelect');
                select.innerHTML = '';
                
                res.dates.forEach(date => {
                    const opt = document.createElement('option');
                    opt.value = date;
                    opt.dataset.id = res.mstMap[date];
                    opt.textContent = `${date.substring(0,4)}년 ${date.substring(4,6)}월 ${date.substring(6,8)}일 시행분`;
                    select.appendChild(opt);
                });

                window.allDates = JSON.stringify(res.dates);
                document.getElementById('historyContainer').classList.remove('hidden');
                document.getElementById('resultView').classList.add('hidden');
            } catch (err) {
                alert("오류: " + err);
            } finally {
                setLoading(false);
            }
        }

        async function startAnalysis() {
            const select = document.getElementById('dateSelect');
            const opt = select.options[select.selectedIndex];
            if (!opt) return;

            setLoading(true);
            try {
                const res = await fetchGAS({
                    action: 'analyze',
                    id: opt.dataset.id,
                    date: opt.value,
                    allDates: window.allDates
                });
                renderResult(res);
            } catch (err) {
                alert("분석 중 오류 발생: " + err);
            } finally {
                setLoading(false);
            }
        }

        function renderResult(res) {
            const { analysis, dateInfo } = res;
            const view = document.getElementById('resultView');
            
            // 요약 영역
            document.getElementById('summaryCard').innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold text-blue-900">분석 결과: ${formatDate(dateInfo.current)} 시행분</h2>
                        <p class="text-blue-700 text-sm mt-1">대조군: ${dateInfo.previous ? formatDate(dateInfo.previous) + ' 시행령' : '최초 제정 또는 이전 데이터 없음'}</p>
                    </div>
                    <span class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase">AI Verified</span>
                </div>
            `;

            // 강화사항 (분석 결과가 배열이 아닐 경우를 대비해 처리)
            const listToHtml = (list) => {
                if (!Array.isArray(list)) return `<li>${list}</li>`;
                return list.map(item => `<li class="flex items-start gap-2"><span class="mt-1.5 w-1.5 h-1.5 bg-slate-400 rounded-full shrink-0"></span>${item}</li>`).join('');
            };

            // GAS의 prompt 설계에 따른 JSON 키 매핑 (강화사항, 조치사항 등)
            // Code.gs의 prompt에 따라 '강화사항', '조치사항' 키로 올 것으로 예상되나, 
            // AI 모델에 따라 키 이름이 변할 수 있으므로 유연하게 처리합니다.
            const data = analysis.analysis || analysis; // 중첩 구조 대응
            
            // 키 찾기 유틸리티
            const findKey = (obj, keywords) => {
                const key = Object.keys(obj).find(k => keywords.some(kw => k.includes(kw)));
                return obj[key] || [];
            };

            const changes = findKey(data, ['강화', '변경', '사항', '핵심']);
            const actions = findKey(data, ['조치', '대응', '액션', 'Action']);

            document.getElementById('changeList').innerHTML = `<ul class="space-y-3">${listToHtml(changes)}</ul>`;
            document.getElementById('actionList').innerHTML = `<ul class="space-y-3">${listToHtml(actions)}</ul>`;

            view.classList.remove('hidden');
            view.scrollIntoView({ behavior: 'smooth' });
        }

        function setLoading(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('searchBtn').disabled = show;
            if (document.getElementById('analyzeBtn')) document.getElementById('analyzeBtn').disabled = show;
        }

        function formatDate(d) {
            if (!d || d.length < 8) return d;
            return `${d.substring(0,4)}년 ${d.substring(4,6)}월 ${d.substring(6,8)}일`;
        }
    </script>
</body>
</html>
