<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환경법령 개정 대응 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#2563eb;--bg:#f0f4f8;--card:#fff;--bd:#dde3ea;--tx:#0f172a;--mu:#64748b;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx)}
.topbar{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}.topbar .logo{font-size:17px;font-weight:900}.topbar .sub{font-size:11px;color:#94a3b8;margin-left:auto}
.tabs{display:flex;background:#1e293b}.tab{flex:1;padding:13px;border:none;background:transparent;color:#94a3b8;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:900;cursor:pointer;border-bottom:3px solid transparent}.tab.active{color:#fff;border-bottom-color:#2563eb}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 80px}
.card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid var(--bd)}
.lbl{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}.lbl::before{content:'';width:3px;height:14px;background:var(--p);border-radius:2px}
.sw{position:relative}.sw::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-top-color:#94a3b8;pointer-events:none}
select{width:100%;padding:13px 42px 13px 16px;border:1.5px solid var(--bd);border-radius:12px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;outline:none;appearance:none;cursor:pointer}select:focus{border-color:var(--p)}select:disabled{opacity:.4}
.type-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}.type-btn{padding:14px 8px;border:2px solid var(--bd);border-radius:14px;background:#fff;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}.type-btn:hover,.type-btn.active{border-color:var(--p);background:#eff6ff}.type-btn .icon{font-size:26px;display:block;margin-bottom:6px}.type-btn .name{font-size:13px;font-weight:900;display:block}.type-btn .desc{font-size:10px;color:var(--mu);display:block;margin-top:2px}
.srow{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--mu);margin-bottom:10px}.dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1}.dot.ok{background:#22c55e}.dot.err{background:var(--red)}.dot.ing{background:#f59e0b;animation:pu 1.2s infinite}@keyframes pu{50%{opacity:.4}}
.run-btn{width:100%;height:56px;border:none;border-radius:14px;background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}.run-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.msg{border-radius:10px;padding:11px 14px;font-size:13px;margin-top:10px;display:none}.msg.show{display:block}.msg.err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}.msg.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}.msg.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.step{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;color:#1d4ed8;margin-bottom:14px;display:none}.step.show{display:block}
.debug-btn{padding:6px 12px;border:1px solid #475569;border-radius:8px;background:#1e293b;font-size:11px;font-weight:700;color:#94a3b8;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif}.debug-panel{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px;margin-top:10px;display:none;font-family:monospace;font-size:11px;color:#94a3b8;max-height:300px;overflow-y:auto}.debug-panel.show{display:block}
.dash{background:var(--card);border-radius:18px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.08)}.dash-head{background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:20px;color:#fff}.dash-head h2{font-size:18px;font-weight:900;margin-bottom:8px}.dash-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.tag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.cmp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.db-act{display:flex;gap:8px;padding:12px 18px;background:#f8fafc;border-bottom:1px solid var(--bd);flex-wrap:wrap}.ab{padding:7px 12px;border:1.5px solid var(--bd);border-radius:8px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--mu);cursor:pointer}.ab:hover{border-color:var(--p);color:var(--p)}
.S{padding:16px 18px;border-bottom:1px solid #f1f5f9}.stl{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px}.stl .n{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.sbox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;font-size:13px;line-height:1.8;color:#1e3a5f}
.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{background:#1e293b;color:#fff;padding:8px;font-weight:700;text-align:left;font-size:11px}.tbl td{padding:8px;border-bottom:1px solid #f1f5f9;vertical-align:top;line-height:1.6}.tbl tr:hover td{background:#f8fafc}
.reg-tbl{width:100%;border-collapse:collapse;font-size:12px;border:2px solid #1e293b}.reg-tbl th{background:#1e293b;color:#fff;padding:8px 6px;font-weight:700;text-align:center;font-size:11px;border:1px solid #334155}.reg-tbl td{padding:8px 6px;border:1px solid var(--bd);text-align:center;vertical-align:middle;line-height:1.5}.reg-tbl td.l{text-align:left}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}.b-cat{background:#eff6ff;color:#1d4ed8}.b-y{background:#fef2f2;color:#dc2626}.b-n{background:#f0fdf4;color:#16a34a}.b-unk{background:#f8fafc;color:#64748b}
.vt{font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px}.vt-강화{background:#fef2f2;color:#dc2626}.vt-완화{background:#f0fdf4;color:#16a34a}.vt-신설{background:#eff6ff;color:#1d4ed8}.vt-삭제{background:#fdf4ff;color:#7c3aed}
.xc{background:#fff;border:1.5px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}.xc-top{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--bd);flex-wrap:wrap}.xc-name{font-size:13px;font-weight:900}.xc-body{padding:14px;display:grid;gap:8px}
.xr{display:flex;gap:6px;font-size:13px;line-height:1.6}.xl{font-size:10px;font-weight:900;color:#fff;background:var(--mu);padding:2px 8px;border-radius:4px;min-width:44px;text-align:center;flex-shrink:0;height:fit-content;margin-top:2px}.xv{flex:1}
.xa{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:13px;color:#1e40af;font-weight:700;line-height:1.7}
.xt{background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:#854d0e;display:inline-block;margin-bottom:6px}
.risk{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;font-weight:700}
.opt{border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px}.opt-nm{font-size:13px;font-weight:900;color:var(--p);margin-bottom:6px}.opt-r{font-size:12px;line-height:1.6;color:#475569;margin-bottom:3px}
.issue{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:10px}.issue-t{font-size:13px;font-weight:900;color:#92400e;margin-bottom:8px}.issue-r{font-size:12px;line-height:1.7;color:#78350f}
.tip{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:10px;font-size:13px;line-height:1.7;color:#14532d}
.rsn{border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}.rsn-t{font-size:12px;font-weight:900;color:var(--mu);margin-bottom:6px}.rsn-v{font-size:13px;line-height:1.7}
.rm-ph{border-left:3px solid var(--p);padding-left:14px;margin-bottom:14px}.rm-lb{font-size:12px;font-weight:900;margin-bottom:6px}.rm-it{font-size:13px;line-height:1.8}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.cat-card{border-radius:12px;padding:14px;text-align:center;border:1px solid var(--bd)}.cat-icon{font-size:24px}.cat-name{font-size:11px;font-weight:900;color:var(--mu)}.cat-cnt{font-size:28px;font-weight:900;margin:4px 0}.cat-urg{font-size:11px;font-weight:700;color:var(--red)}
.rc{background:#fff;border:1.5px solid var(--bd);border-radius:14px;margin-bottom:10px;padding:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.rc-nm{font-size:14px;font-weight:900}.rc-dt{font-size:11px;font-weight:700;color:var(--p);background:#eff6ff;padding:2px 8px;border-radius:4px}
/* 담당자 */
.sf{display:grid;gap:10px;margin-bottom:14px}.sf input,.sf select{padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;outline:none}.sf input:focus,.sf select:focus{border-color:var(--p)}
.st-row{background:#fff;border:1.5px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px}.st-name{font-size:14px;font-weight:900}.st-email{font-size:12px;color:var(--mu)}.st-laws{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.st-law{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:#eff6ff;color:#1d4ed8}
.st-del{border:none;background:#fef2f2;color:#dc2626;font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px}
.dash-foot{padding:14px 18px;background:#f8fafc;border-top:1px solid var(--bd);font-size:11px;color:var(--mu)}
@media print{.topbar,.tabs,.card,.run-btn,.step,.db-act,.debug-btn,.debug-panel,.msg{display:none!important}.wrap{padding:0}.dash{box-shadow:none;border:none}}
</style>
</head>
<body>
<div class="topbar"><div class="logo">📋 환경법령 개정 대응 대시보드</div><div class="sub">여수 석유화학공장 환경안전팀</div></div>
<div class="tabs"><button class="tab active" id="tab1" onclick="switchTab(1)">📋 법규 비교 분석</button><button class="tab" id="tab2" onclick="switchTab(2)">📢 입법예고</button></div>
<div class="wrap">
<!-- TAB 1 -->
<div id="panel1">
<div class="card"><div class="lbl">1. 대상 법령 선택</div><div class="sw"><select id="lawSel" onchange="onLawChange()"><option value="">법령을 선택하세요</option><option value="대기환경보전법">대기환경보전법</option><option value="물환경보전법">물환경보전법</option><option value="화학물질관리법">화학물질관리법</option><option value="화학물질 등록 및 평가법">화학물질 등록 및 평가법</option><option value="산업안전보건법">산업안전보건법</option><option value="위험물안전관리법">위험물안전관리법</option><option value="소음·진동관리법">소음·진동관리법</option><option value="악취방지법">악취방지법</option><option value="토양환경보전법">토양환경보전법</option><option value="환경영향평가법">환경영향평가법</option><option value="환경오염시설의 통합관리에 관한 법률">통합환경관리법</option></select></div></div>
<div class="card"><div class="lbl">2. 법령 종류 선택</div><div class="type-btns"><button class="type-btn active" id="btn-law" onclick="setType('law')"><span class="icon">📜</span><span class="name">법</span><span class="desc">법률 본문</span></button><button class="type-btn" id="btn-decree" onclick="setType('decree')"><span class="icon">📋</span><span class="name">시행령</span><span class="desc">대통령령</span></button><button class="type-btn" id="btn-rule" onclick="setType('rule')"><span class="icon">📄</span><span class="name">시행규칙</span><span class="desc">부령</span></button></div></div>
<div class="card"><div class="srow"><div class="dot" id="dot"></div><span id="gasMsg">법령 선택 후 자동 조회</span></div><div class="lbl">3. 시행일자 선택</div><div class="sw"><select id="dateSel" disabled><option>법령 및 종류를 먼저 선택</option></select></div><div class="msg err" id="errBox"></div><div class="msg warn" id="warnBox"></div><button class="debug-btn" id="debugBtn" onclick="runDebug()">🔍 API 진단</button><div class="debug-panel" id="debugPanel"></div></div>
<button class="run-btn" id="runBtn" onclick="run()">⚡ 개정 내용 분석 실행</button><div class="step" id="stepBox"></div>
<div class="dash" id="dash" style="display:none"><div class="dash-head"><h2 id="dTitle"></h2><div class="dash-tags" id="dTags"></div><div class="cmp" id="dCmp"></div></div><div class="db-act"><button class="ab" onclick="window.print()">🖨️ 인쇄</button><button class="ab" onclick="printReg()">📋 법규등록부</button></div><div id="dashBody"></div><div class="dash-foot"><span id="dMeta"></span></div></div>
</div>
<!-- TAB 2 -->
<div id="panel2" style="display:none">
<div class="card"><div class="lbl">담당자 관리</div>
<div class="sf">
<input id="stName" placeholder="이름 (예: 홍길동)">
<input id="stEmail" placeholder="이메일 (예: hong@company.com)">
<select id="stLaw" multiple style="height:120px"><option value="대기환경보전법">대기환경보전법</option><option value="물환경보전법">물환경보전법</option><option value="화학물질관리법">화학물질관리법</option><option value="산업안전보건법">산업안전보건법</option><option value="위험물안전관리법">위험물안전관리법</option><option value="소음·진동관리법">소음·진동관리법</option><option value="악취방지법">악취방지법</option><option value="토양환경보전법">토양환경보전법</option><option value="환경영향평가법">환경영향평가법</option></select>
<p style="font-size:11px;color:var(--mu)">Ctrl/Cmd 클릭으로 담당 법규 복수 선택</p>
<button class="run-btn" style="height:48px;margin:0" onclick="addStaff()">➕ 담당자 추가</button>
</div>
<div id="staffList"></div>
<button class="run-btn" style="height:48px;background:linear-gradient(135deg,#059669,#10b981)" onclick="syncStaff()">💾 서버에 저장 (이메일 알림 연동)</button>
<div class="msg ok" id="syncMsg"></div>
</div>
<div class="card"><div class="lbl">입법예고 목록</div>
<p style="font-size:13px;color:var(--mu);margin-bottom:12px">매일 자동 감지된 환경법규 입법예고 목록입니다. 항목을 클릭하면 AI 영향 분석 보고서를 확인할 수 있습니다.</p>
<div id="noticeLoading" style="text-align:center;color:var(--p);font-weight:700;padding:10px">법제처 데이터 조회 중... (최초 1회 최대 30초)</div>
</div>
<div id="recentList"></div>
</div>
</div>
<!-- 팝업 모달 (Tab2 보고서용) -->
<div id="analysisModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9999;overflow-y:auto;padding:20px">
<div style="max-width:800px;margin:20px auto;background:#fff;border-radius:18px;border:2px solid var(--p);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3)">
<div style="background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
<div style="color:#fff;font-size:16px;font-weight:900">📋 AI 영향 분석 보고서</div>
<button onclick="closeAnalysis()" style="border:none;background:rgba(255,255,255,.15);color:#fff;padding:8px 16px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer">✕ 닫기</button>
</div>
<div style="padding:20px">
<div id="analysisTitle" style="font-size:16px;font-weight:900;color:var(--p);margin-bottom:14px"></div>
<div id="analysisBody"></div>
<div id="analysisMeta" style="font-size:11px;color:var(--mu);margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)"></div>
<!-- 피드백 영역 -->
<div id="feedbackArea" style="margin-top:16px;padding-top:16px;border-top:2px solid var(--p)">
<div style="font-size:13px;font-weight:900;color:var(--p);margin-bottom:8px">💬 AI 피드백 (보고서 개선 요청)</div>
<textarea id="feedbackInput" placeholder="예: 제12조1항은 삭제된 조문이다. 제20~40조 사이 배출기준 관련 조문을 중점 분석해달라." style="width:100%;height:80px;border:1.5px solid var(--bd);border-radius:10px;padding:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;resize:vertical;outline:none"></textarea>
<div style="display:flex;gap:8px;margin-top:8px">
<button onclick="submitFeedback()" style="flex:1;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:900;cursor:pointer">🔄 피드백 반영하여 재분석</button>
<button onclick="clearAndReanalyze()" style="padding:12px 16px;border:none;border-radius:10px;background:#dc2626;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:900;cursor:pointer">🗑️ 삭제 후 재분석</button>
</div>
</div>
</div>
</div>
</div>
<script>
var GAS="https://script.google.com/macros/s/AKfycbxwUThK1JjDe5MLFzxAB2OZlAus2iDcmhWs1uUudxKDVNvxR1iG5TN8kCVYGDoyhRkW-w/exec";
var lawName="",lawType="law",allDates=[],mstMap={},staffData=[];

function switchTab(n){document.getElementById("panel1").style.display=n===1?"block":"none";document.getElementById("panel2").style.display=n===2?"block":"none";document.getElementById("tab1").classList.toggle("active",n===1);document.getElementById("tab2").classList.toggle("active",n===2);if(n===2){loadStaffFromServer();loadNotices();}}

// ── 담당자 관리 ─────────────────────────────────────
function addStaff(){var nm=document.getElementById("stName").value.trim(),em=document.getElementById("stEmail").value.trim();var sel=document.getElementById("stLaw"),laws=[];for(var i=0;i<sel.options.length;i++){if(sel.options[i].selected)laws.push(sel.options[i].value);}
if(!nm||!em){alert("이름과 이메일을 입력하세요");return;}if(!laws.length){alert("담당 법규를 선택하세요");return;}
staffData.push({name:nm,email:em,laws:laws});renderStaff();document.getElementById("stName").value="";document.getElementById("stEmail").value="";sel.selectedIndex=-1;}
function removeStaff(i){staffData.splice(i,1);renderStaff();}

// ── AI 영향 분석 (서버 캐시 우선, 선택일 vs 현행 비교) ─
async function openAnalysis(name,date,mst){
  var panel=document.getElementById("analysisModal");
  var body=document.getElementById("analysisBody");
  var title=document.getElementById("analysisTitle");
  var meta=document.getElementById("analysisMeta");
  var key=name+"_"+date;
  curReportCtx={name:name,date:date,mst:mst,lastJson:""};
  panel.style.display="block";
  title.textContent="📋 "+name+" ("+date+" 시행)";
  body.innerHTML='<div style="text-align:center;padding:20px;color:var(--mu)">보고서 확인 중...</div>';
  meta.textContent="";
  panel.scrollIntoView({behavior:"smooth"});
  // 1순위: localStorage 캐시 (즉시, 확실)
  var lsKey="rpt_"+key;
  try{
    var ls=localStorage.getItem(lsKey);
    if(ls){var c=JSON.parse(ls);body.innerHTML=c.html;meta.textContent="💾 저장된 보고서 · "+c.date+" · "+c.model;return;}
  }catch(ex){}
  // 2순위: 서버 캐시
  try{
    var cached=await jp({action:"getReport",key:key,callback:"__cbgr"},"__cbgr",10000);
    if(cached.report){
      body.innerHTML=cached.report.html;
      meta.textContent="💾 서버 보고서 · "+cached.report.date+" · "+cached.report.model;
      try{localStorage.setItem(lsKey,JSON.stringify(cached.report));}catch(ex){}
      return;
    }
  }catch(ex){}
  // 2순위: 시행일 목록 조회 → 선택일 vs 현행 비교 분석
  body.innerHTML='<div style="text-align:center;padding:30px;color:var(--p);font-weight:700"><div class="spin" style="margin:0 auto 12px;border-top-color:var(--p);border-color:#bfdbfe"></div>① 시행일 목록 조회 중...</div>';
  try{
    // 해당 법령의 전체 시행일 + MST 조회
    var dates=await jp({action:"dates",lawName:name,lawType:"law",callback:"__cbd2"},"__cbd2",30000);
    var allD=dates.dates||[];
    var allMst=dates.mstMap||{};
    var currentMst=allD.length>0?(allMst[allD[0]]||""):"";
    var selMst=allMst[date.replace(/-/g,"")]||mst||"";
    body.innerHTML='<div style="text-align:center;padding:30px;color:var(--p);font-weight:700"><div class="spin" style="margin:0 auto 12px;border-top-color:var(--p);border-color:#bfdbfe"></div>② AI 영향 분석 중... (최대 120초)</div>';
    // 선택일 vs 현행 비교 분석
    var d=await jp({action:"analyze",lawName:name,date:date.replace(/-/g,""),id:selMst,currentId:currentMst,lawType:"law",allDates:JSON.stringify(allD),allMst:JSON.stringify(allMst),callback:"__cba2"},"__cba2",120000);
    if(d.error){body.innerHTML='<div class="msg err show">'+esc(d.error)+'</div>';return;}
    d.lawName=name;
    var pd=d.data||{};
    var html=renderReport(pd,d);
    body.innerHTML=html;
    var now=new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    meta.textContent=(d.model||"AI")+" · "+now+" · 선택일("+esc(d.selDateFmt||"")+") vs 현행("+esc(d.currentDateFmt||"")+")";
    // localStorage 저장 (확실) + 서버 저장 (팀 공유)
    var saveData=JSON.stringify({html:html,date:now,model:d.model||"AI"});
    try{localStorage.setItem(lsKey,saveData);}catch(ex){}
    try{await jp({action:"saveReport",key:key,data:saveData,callback:"__cbsr"},"__cbsr",10000);}catch(ex){}
  }catch(ex){body.innerHTML='<div class="msg err show">분석 실패: '+esc(ex.message)+'</div>';}
}

  try{
    var d=await jp({action:"refine",feedback:fb,prevReport:curReportCtx.lastJson.slice(0,2000),lawName:curReportCtx.name,callback:"__cbrf"},"__cbrf",120000);

    try{localStorage.setItem(lsKey,saveData);}catch(ex){}

    document.getElementById("feedbackInput").value="";
  }catch(ex){body.innerHTML='<div class="msg err show">피드백 반영 실패: '+esc(ex.message)+'</div>';}
}

  // 행정처분
  var pens=pd.행정처분||[];if(pens.length){h+='<div style="font-weight:900;margin:12px 0 8px">⚖️ 행정처분</div>';pens.forEach(function(x){h+='<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px;margin-bottom:6px;font-size:13px">'+artLink(x.근거조문||"")+' '+esc(x.위반내용||"")+" → <span style='color:#dc2626;font-weight:900'>"+esc(x.처분내용||"")+'</span></div>';});}
  // 부칙/별표

  if(pd.별표분석&&pd.별표분석!=="해당사항없음"&&pd.별표분석!=="해당 사항 없음")h+='<div style="font-weight:900;margin:12px 0 8px">📊 별표 분석</div><div class="sbox" style="background:#ecfeff;border-color:#a5f3fc;color:#155e75">'+esc(pd.별표분석)+'</div>';

function jp(p,cb,ms){return new Promise(function(res,rej){var old=document.getElementById("__"+cb);if(old)old.remove();var t=setTimeout(function(){delete window[cb];rej(new Error("응답없음"));},ms);window[cb]=function(d){clearTimeout(t);delete window[cb];res(d);};var s=document.createElement("script");s.id="__"+cb;s.src=GAS+"?"+new URLSearchParams(p).toString();s.onerror=function(){clearTimeout(t);delete window[cb];rej(new Error("연결실패"));};document.body.appendChild(s);});}

var h='';h+=rReg(pd);if(pd.개정사유요약)h+='<div class="S"><div class="stl"><span class="n" style="background:#dc2626">★</span>이 법규는 왜 개정되었나?</div><div class="sbox" style="background:#fef2f2;border-color:#fecaca;color:#991b1b">'+esc(pd.개정사유요약)+'</div></div>';h+=rCat(pd)+rComp(pd)+rAppx(pd)+rDef(pd)+rOpt(pd)+rPen(pd)+rRoad(pd)+rExec(pd)+rIss(pd)+rTip(pd)+rRes(pd);
document.getElementById("dashBody").innerHTML=h;document.getElementById("dMeta").textContent=(data.model||"AI")+" · "+new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});document.getElementById("dash").style.display="block";setTimeout(function(){document.getElementById("dash").scrollIntoView({behavior:"smooth"});},100);}

function rReg(d){var r=d.법규등록부||[];if(!r.length)return'';var h='<div class="S reg-s"><div class="stl"><span class="n" style="background:#1e293b">①</span>법규등록부</div><table class="reg-tbl"><thead><tr><th>법규명</th><th>재개정일</th><th>시행일</th><th>내용</th><th>관리방법</th><th>부서</th></tr></thead><tbody>';r.forEach(function(x){h+='<tr><td>'+esc(x.법규명||"")+'</td><td>'+esc(x.재개정일자||"")+'</td><td>'+esc(x.시행일자||"")+'</td><td class="l">'+esc(x.법규내용||"")+'</td><td class="l">'+esc(x.관리방법||"")+'</td><td>'+esc(x.관련부서||"")+'</td></tr>';});return h+'</tbody></table></div>';}
function rCat(d){var s=d.summary||{};var cs=[{k:"배출기준",i:"🏭",c:"#dc2626"},{k:"설비기준",i:"⚙️",c:"#7c3aed"},{k:"운영관리",i:"📋",c:"#d97706"}];var h='<div class="S"><div class="cat-grid">';cs.forEach(function(c){var v=s[c.k]||{건수:0,설비보완Y:0};h+='<div class="cat-card"><span class="cat-icon">'+c.i+'</span><span class="cat-name">'+c.k+'</span><div class="cat-cnt" style="color:'+c.c+'">'+v.건수+'</div>'+(v.설비보완Y?'<span class="cat-urg">설비보완 '+v.설비보완Y+'건</span>':'')+'</div>';});return h+'</div></div>';}
function rComp(d){var ch=d.비교표||[];if(!ch.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#d97706">B</span>변경 비교표</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>분류</th><th>조문</th><th>현행</th><th>개정</th><th>유형</th><th>현장변화</th><th>설비</th></tr></thead><tbody>';ch.forEach(function(c){var bc=c.설비보완필요==="Y"?"b-y":c.설비보완필요==="N"?"b-n":"b-unk";var art=esc(c.조문||"");var lawLink="https://www.law.go.kr/법령/"+encodeURIComponent(lawName);var artHtml=art?'<a href="'+lawLink+'" target="_blank" style="font-weight:900;color:var(--p);text-decoration:underline">'+art+'</a>':'';h+='<tr><td><span class="badge b-cat">'+esc(c.카테고리||"")+'</span></td><td style="white-space:nowrap">'+artHtml+'</td><td>'+esc(c.현행||"")+'</td><td>'+esc(c.개정||"")+'</td><td><span class="vt vt-'+esc(c.변화유형||"")+'">'+esc(c.변화유형||"")+'</span></td><td style="font-size:12px">'+esc(c.현장변화점||"")+(c.독소조항&&c.독소조항!=="해당없음"&&c.독소조항!=="해당 사항 없음"?'<br><span style="color:#dc2626;font-weight:900">⚠️ '+esc(c.독소조항)+'</span>':'')+'</td><td><span class="badge '+bc+'">'+esc(c.설비보완필요||"")+'</span></td></tr>';});return h+'</tbody></table></div></div>';}
function rDef(d){var a=d.대상설비정의||[];if(!a.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#059669">C</span>규제 대상 설비</div>';a.forEach(function(x){h+='<div class="xc"><div class="xc-top"><span class="xc-name">'+esc(x.법규상정의||"")+'</span><span class="badge b-unk">'+esc(x.해당여부||"")+'</span></div><div class="xc-body"><div class="xr"><span class="xl">근거</span><div class="xv" style="font-weight:700;color:var(--p)">'+esc(x.근거조문||"")+'</div></div></div></div>';});return h+'</div>';}
function rOpt(d){var o=d.대응방안||[];if(!o.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#7c3aed">D</span>대응 방안</div>';o.forEach(function(x){h+='<div class="opt"><div class="opt-nm">['+esc(x.카테고리||"")+'] '+esc(x.과업||"")+'</div>';if(x.세부내용)h+='<div class="opt-r">'+esc(x.세부내용)+'</div>';h+='<div class="opt-r" style="color:var(--mu)">비용: '+esc(x.비용영향요소||"사업장별 확인")+'</div></div>';});return h+'</div>';}
function rPen(d){var p=d.행정처분||[];if(!p.length)return'';var lawLink="https://www.law.go.kr/법령/"+encodeURIComponent(lawName);var h='<div class="S"><div class="stl"><span class="n" style="background:#dc2626">E</span>행정처분</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>위반</th><th>근거</th><th>유형</th><th>내용</th></tr></thead><tbody>';p.forEach(function(x){var art=esc(x.근거조문||"");var artHtml=art?'<a href="'+lawLink+'" target="_blank" style="font-weight:900;color:var(--p);text-decoration:underline">'+art+'</a>':art;h+='<tr><td>'+esc(x.위반내용||"")+'</td><td>'+artHtml+'</td><td>'+esc(x.처분유형||"")+'</td><td style="color:#dc2626;font-weight:700">'+esc(x.처분내용||"")+'</td></tr>';});return h+'</tbody></table></div></div>';}
function rRoad(d){var r=d.로드맵;if(!r||!r.계획)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#2563eb">F</span>D-Day 로드맵 ('+esc(r.시행일||"")+')</div>';var cl={"D-90":"#dc2626","D-60":"#d97706","D-30":"#2563eb","D-7":"#059669"};(r.계획||[]).forEach(function(x){var c=cl[x.시점]||"#64748b";h+='<div class="rm-ph" style="border-color:'+c+'"><div class="rm-lb" style="color:'+c+'">📌 '+esc(x.시점||"")+'</div><div class="rm-it">'+esc(x.과업||"")+(x.담당?' — <b>'+esc(x.담당)+'</b>':'')+'</div></div>';});return h+'</div>';}
function rExec(d){var a=d.실행지시||[];if(!a.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#0f172a">G</span>실행지시 ('+a.length+')</div>';a.forEach(function(c){h+='<div class="xc"><div class="xc-top"><span class="xc-name">'+esc(c.작업명||"")+'</span><span class="badge b-cat">'+esc(c.카테고리||"")+'</span></div><div class="xc-body">';if(c.트리거)h+='<span class="xt">⚡ '+esc(c.트리거)+'</span>';if(c.즉시행동)h+='<div class="xa">'+esc(c.즉시행동)+'</div>';h+='<div class="xr"><span class="xl">담당</span><div class="xv">'+esc(c.담당||"")+(c.기한?' · <b>'+esc(c.기한)+'</b>':'')+'</div></div>';if(c.비용영향요소)h+='<div class="xr"><span class="xl">비용</span><div class="xv">'+esc(c.비용영향요소)+'</div></div>';if(c.리스크)h+='<div class="risk">⚠️ '+esc(c.리스크)+'</div>';h+='</div></div>';});return h+'</div>';}
function rIss(d){var i=d.해석이슈||[];if(!i.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#d97706">H</span>해석 이슈</div>';i.forEach(function(x){h+='<div class="issue"><div class="issue-t">⚠️ '+esc(x.이슈||"")+'</div>';if(x.판단기준)h+='<div class="issue-r">판단: '+esc(x.판단기준)+'</div>';if(x.권장대응)h+='<div class="issue-r">대응: '+esc(x.권장대응)+'</div>';h+='</div>';});return h+'</div>';}
function rTip(d){var t=d.전문가팁||[];if(!t.length)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#059669">I</span>전문가 팁</div>';t.forEach(function(x){h+='<div class="tip">💡 '+esc(x)+'</div>';});return h+'</div>';}
function rRes(d){var r=d.소요자원;if(!r)return'';var h='<div class="S"><div class="stl"><span class="n" style="background:#64748b">J</span>소요 자원</div>';if(r.비용영향요소&&r.비용영향요소.length){h+='<div class="rsn"><div class="rsn-t">💰 비용 영향 요소</div><div class="rsn-v">';r.비용영향요소.forEach(function(x){h+='• '+esc(x)+'<br>';});h+='</div></div>';}h+='<div class="rsn"><div class="rsn-t">👤 인력</div><div class="rsn-v">'+esc(r.인력||"사업장별 확인")+'</div></div>';return h+'</div>';}
function rAppx(d){var h='';if(d.부칙분석&&d.부칙분석!=="해당사항없음"&&d.부칙분석!=="해당 사항 없음")h+='<div class="S"><div class="stl"><span class="n" style="background:#7c3aed">📎</span>부칙 분석 (경과조치/적용례)</div><div class="sbox" style="background:#fdf4ff;border-color:#e9d5ff;color:#6b21a8">'+esc(d.부칙분석)+'</div></div>';if(d.별표분석&&d.별표분석!=="해당사항없음"&&d.별표분석!=="해당 사항 없음")h+='<div class="S"><div class="stl"><span class="n" style="background:#0891b2">📊</span>별표/서식 분석</div><div class="sbox" style="background:#ecfeff;border-color:#a5f3fc;color:#155e75">'+esc(d.별표분석)+'</div></div>';return h;}

function setDot(s,m){document.getElementById("dot").className="dot "+s;document.getElementById("gasMsg").textContent=m;}
function showErr(h){document.getElementById("errBox").innerHTML=h;document.getElementById("errBox").classList.add("show");}
function hideMsg(id){document.getElementById(id).classList.remove("show");}
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
