<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PETRO-LAW AI ADVISOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --success: #16a34a;
      --warn: #d97706;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); padding: 16px; }

    .wrap { max-width: 720px; margin: 0 auto; }

    /* 헤더 */
    .hdr { text-align: center; margin-bottom: 28px; padding: 24px 0 0; }
    .hdr h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; font-style: italic; text-transform: uppercase; }
    .hdr p  { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* 카드 */
    .card { background: var(--card); border-radius: 24px; padding: 24px; margin-bottom: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }

    /* 레이블 */
    .lbl { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); margin-bottom: 12px; }

    /* 드롭다운 */
    .sel-wrap { position: relative; }
    .sel-wrap::after { content: ''; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 6px solid #94a3b8; pointer-events: none; }
    select {
      width: 100%; padding: 14px 44px 14px 18px;
      border: 2px solid var(--border); border-radius: 14px;
      background: white; font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
      outline: none; appearance: none; -webkit-appearance: none;
      cursor: pointer; transition: border-color 0.2s;
    }
    select:hover, select:focus { border-color: var(--primary); }
    select:disabled { opacity: 0.4; cursor: not-allowed; background: #f8fafc; }

    /* 상태 */
    .srow { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; }
    .dot.ok  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .dot.err { background: #f87171; box-shadow: 0 0 6px #f87171; }
    .dot.ing { background: #fbbf24; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* 버튼 */
    .run-btn {
      width: 100%; height: 62px; border: none; border-radius: 20px;
      background: #111827; color: white;
      font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 900;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 10px; transition: all 0.2s; margin-bottom: 14px;
    }
    .run-btn:hover:not(:disabled) { background: var(--primary); box-shadow: 0 6px 24px rgba(79,70,229,0.4); transform: translateY(-1px); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .spin { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 에러/경고 */
    .msg { border-radius: 12px; padding: 12px 16px; font-size: 13px; line-height: 1.7; margin-top: 10px; display: none; }
    .msg.show { display: block; }
    .msg.err  { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .msg.warn { background: #fef9c3; border: 1px solid #fde047; color: #854d0e; }
    .msg.ok   { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
    .msg.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

    /* 로딩 단계 */
    .step { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 12px 16px; font-size: 13px; font-weight: 700; color: #15803d; margin-bottom: 14px; display: none; }
    .step.show { display: block; }

    /* 결과 */
    .result { background: var(--card); border-radius: 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); overflow: hidden; }
    .result-head {
      background: linear-gradient(135deg, #1e293b, #334155);
      padding: 24px; color: white;
    }
    .result-head h2 { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .bd-blue { background: rgba(99,102,241,0.3); color: #a5b4fc; }
    .bd-ora  { background: rgba(249,115,22,0.3); color: #fdba74; }
    .bd-grn  { background: rgba(52,211,153,0.3); color: #6ee7b7; }
    .bd-ylw  { background: rgba(251,191,36,0.3); color: #fde68a; }
    .result-body { padding: 0; }

    /* 섹션 렌더링 */
    .section {
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-size: 14px; font-weight: 900; color: var(--primary);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title .num {
      background: var(--primary); color: white;
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .section-content { font-size: 14px; line-height: 1.9; color: #374151; }
    .section-content p  { margin-bottom: 8px; }
    .section-content ul { padding-left: 0; list-style: none; }
    .section-content li { padding: 4px 0 4px 16px; position: relative; }
    .section-content li::before { content: '•'; position: absolute; left: 0; color: var(--primary); font-weight: 900; }

    /* 체크리스트 */
    .checklist li { padding: 6px 0 6px 28px; }
    .checklist li::before { content: '□'; font-size: 15px; color: var(--primary); }

    /* 전체 원문 텍스트 영역 (파싱 실패 시) */
    .raw-text { font-size: 13px; line-height: 1.9; color: #374151; white-space: pre-wrap; word-break: break-word; }

    .result-foot {
      padding: 14px 24px;
      background: #f8fafc;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }
    .result-foot span { font-size: 11px; color: var(--muted); }

    .copy-btn {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      background: white; font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <h1>Petro-Law AI Advisor</h1>
    <p>법제처 실시간 연동 · Groq AI 원문 분석 · 여수 석유화학단지 특화</p>
  </div>

  <!-- STEP 1 -->
  <div class="card">
    <div class="lbl">1. 대상 법령 선택</div>
    <div class="sel-wrap">
      <select id="lawSelect" onchange="onLawChange()">
        <option value="">법령을 선택하세요</option>
        <option value="대기환경보전법|001160">대기환경보전법</option>
        <option value="물환경보전법|001153">물환경보전법</option>
        <option value="화학물질관리법|001211">화학물질관리법</option>
        <option value="화학물질 등록 및 평가법|001210">화학물질 등록 및 평가법</option>
        <option value="산업안전보건법|001138">산업안전보건법</option>
        <option value="위험물안전관리법|001115">위험물안전관리법</option>
        <option value="소음·진동관리법|001177">소음·진동관리법</option>
        <option value="악취방지법|001173">악취방지법</option>
        <option value="토양환경보전법|001213">토양환경보전법</option>
        <option value="환경영향평가법|001071">환경영향평가법</option>
      </select>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <div class="srow"><div class="dot" id="dot"></div><span id="apiMsg">법령 선택 후 자동 조회</span></div>
    <div class="lbl">2. 시행일자 선택</div>
    <div class="sel-wrap">
      <select id="dateSelect" disabled>
        <option value="">법령을 먼저 선택하세요</option>
      </select>
    </div>
    <div class="msg err" id="errBox"></div>
  </div>

  <!-- 실행 -->
  <button class="run-btn" id="runBtn" onclick="runAnalysis()">AI 분석 실행</button>
  <div class="step" id="stepBox"></div>

  <!-- 결과 -->
  <div class="result" id="resultWrap" style="display:none">
    <div class="result-head">
      <h2 id="resTitle"></h2>
      <div class="badges" id="resBadges"></div>
    </div>
    <div class="msg" id="sourceNote" style="margin:16px 24px 0;display:none"></div>
    <div class="result-body" id="resBody"></div>
    <div class="result-foot">
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <span id="resModel"></span>
        <span id="resTime"></span>
      </div>
      <button class="copy-btn" onclick="copyResult()">복사</button>
    </div>
  </div>

</div>
<script>
const GAS = "https://script.google.com/macros/s/AKfycby9bnLyNyujB2Vu1X2GAIU2TciUpKhyABjApkwzGF5PG_gYIztc4FUYW-XUXGRvJwHXvw/exec";

let curLawId="", curLawName="", curMst="", lastText="";

// ── JSONP ──────────────────────────────────────────────
function jsonp(params, cb, ms) {
  return new Promise(function(resolve, reject) {
    var old = document.getElementById("__s"+cb); if(old) old.remove();
    var t = setTimeout(function(){ delete window[cb]; reject(new Error("응답 없음 ("+ms/1000+"초)")); }, ms);
    window[cb] = function(d){ clearTimeout(t); delete window[cb]; resolve(d); };
    var s = document.createElement("script");
    s.id = "__s"+cb;
    s.src = GAS + "?" + new URLSearchParams(params).toString();
    s.onerror = function(){ clearTimeout(t); delete window[cb]; reject(new Error("GAS 연결 실패")); };
    document.body.appendChild(s);
  });
}

// ── 법령 선택 ──────────────────────────────────────────
async function onLawChange() {
  var val = document.getElementById("lawSelect").value;
  var sel = document.getElementById("dateSelect");
  var err = document.getElementById("errBox");
  err.classList.remove("show");

  if (!val) { sel.innerHTML="<option value=''>법령을 먼저 선택하세요</option>"; sel.disabled=true; setDot("","법령 선택 후 자동 조회"); return; }

  var parts = val.split("|"); curLawName=parts[0]; curLawId=parts[1];
  sel.disabled=true; sel.innerHTML="<option>조회 중...</option>"; setDot("ing","법제처 연혁 조회 중...");

  try {
    var data = await jsonp({ action:"dates", lawName:curLawName, id:curLawId, callback:"__cb_d" }, "__cb_d", 15000);

    if (data.error) { setDot("err","오류"); sel.innerHTML="<option>오류</option>"; showErr(data.error); return; }
    if (!data.dates || !data.dates.length) { setDot("ok","연결됨"); sel.innerHTML="<option value=''>시행일 없음</option>"; return; }

    curMst = data.mst || "";
    setDot("ok","연결됨 ✓  ("+data.dates.length+"건)");
    sel.innerHTML = "<option value=''>시행일을 선택하세요</option>" +
      data.dates.map(function(d){
        var f=d.slice(0,4)+"년 "+d.slice(4,6)+"월 "+d.slice(6,8)+"일";
        return '<option value="'+d+'">'+f+' 시행분</option>';
      }).join("");
    sel.disabled=false;
  } catch(e) {
    setDot("err","연결 실패"); sel.innerHTML="<option>연결 실패</option>"; showErr(e.message);
  }
}

// ── AI 분석 ────────────────────────────────────────────
async function runAnalysis() {
  if (!curLawId) { alert("법령을 선택해주세요."); return; }
  var date = document.getElementById("dateSelect").value;
  if (!date) { alert("시행일을 선택해주세요."); return; }

  var btn=document.getElementById("runBtn"), step=document.getElementById("stepBox");
  btn.disabled=true; btn.innerHTML='<div class="spin"></div>&ensp;분석 중...';
  document.getElementById("resultWrap").style.display="none";
  step.classList.add("show"); step.textContent="법제처에서 "+curLawName+" 원문 가져오는 중...";

  try {
    step.textContent = "AI가 원문 비교 분석 중... (최대 60초)";
    var data = await jsonp(
      { action:"analyze", id:curLawId, date:date, lawName:curLawName, mst:curMst, callback:"__cb_a" },
      "__cb_a", 60000
    );

    if (data.error) throw new Error(data.error);

    var df = date.slice(0,4)+"-"+date.slice(4,6)+"-"+date.slice(6,8);
    lastText = data.content;

    document.getElementById("resTitle").textContent = curLawName;
    document.getElementById("resBadges").innerHTML =
      '<span class="badge bd-blue">'+df+' 시행</span>' +
      '<span class="badge bd-ora">석유화학 현장</span>' +
      (data.hasSource ? '<span class="badge bd-grn">원문 기반</span>' : '<span class="badge bd-ylw">AI 추정 포함</span>') +
      (data.tokens ? '<span class="badge bd-grn">'+data.tokens.toLocaleString()+'토큰</span>' : "");

    // 원문 여부 표시
    var note = document.getElementById("sourceNote");
    if (data.hasSource) {
      note.className = "msg ok"; note.style.display = "block";
      note.textContent = "✅ 법제처 원문(개정이유+조문) 기반으로 분석했습니다.";
    } else {
      note.className = "msg warn"; note.style.display = "block";
      note.textContent = "⚠️ 법제처 원문을 가져오지 못해 AI 추정값이 포함될 수 있습니다. 반드시 법제처 원문을 직접 확인하세요.";
    }

    // 결과 렌더링
    renderResult(data.content);

    document.getElementById("resModel").textContent = "모델: "+(data.model||"Groq");
    document.getElementById("resTime").textContent  = new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    document.getElementById("resultWrap").style.display = "block";
    setTimeout(function(){ document.getElementById("resultWrap").scrollIntoView({behavior:"smooth",block:"start"}); }, 100);

  } catch(e) {
    alert("분석 오류: "+e.message);
  } finally {
    btn.disabled=false; btn.innerHTML="AI 분석 실행";
    step.classList.remove("show");
  }
}

// ── 결과 렌더링 ────────────────────────────────────────
function renderResult(text) {
  var body = document.getElementById("resBody");

  // ■ 섹션 분리 시도
  var sectionPatterns = [
    { key:"1", title:"핵심 개정 요약" },
    { key:"2", title:"조항별 변경 내용" },
    { key:"3", title:"석유화학 설비별 영향" },
    { key:"4", title:"인허가 행정 조치" },
    { key:"5", title:"위반 시 제재" },
    { key:"6", title:"현장 준비 체크리스트" },
  ];

  // 섹션 분리
  var sections = [];
  var remaining = text;

  for (var i = 0; i < sectionPatterns.length; i++) {
    var sp = sectionPatterns[i];
    var next = i < sectionPatterns.length-1 ? sectionPatterns[i+1] : null;

    var startRx = new RegExp("(?:■|##+|\\*\\*)?\\s*" + sp.key + "[\\. ].*?(?:\\n|$)", "i");
    var startMatch = remaining.search(startRx);
    if (startMatch === -1) continue;

    var content = "";
    if (next) {
      var endRx = new RegExp("(?:■|##+|\\*\\*)?\\s*" + next.key + "[\\. ].*?(?:\\n|$)", "i");
      var endMatch = remaining.slice(startMatch).search(endRx);
      if (endMatch > 0) {
        content = remaining.slice(startMatch, startMatch+endMatch);
        remaining = remaining.slice(startMatch+endMatch);
      } else {
        content = remaining.slice(startMatch);
      }
    } else {
      content = remaining.slice(startMatch);
    }

    // 섹션 제목 제거
    content = content.replace(startRx, "").trim();
    sections.push({ key: sp.key, title: sp.title, content: content });
  }

  if (sections.length === 0) {
    // 파싱 실패 → 원문 그대로
    body.innerHTML = '<div class="section"><div class="raw-text">' + escHtml(text) + '</div></div>';
    return;
  }

  var html = "";
  sections.forEach(function(sec) {
    var isChecklist = sec.key === "6";
    var content = renderContent(sec.content, isChecklist);
    html +=
      '<div class="section">' +
        '<div class="section-title"><span class="num">'+sec.key+'</span>'+sec.title+'</div>' +
        '<div class="section-content">' + content + '</div>' +
      '</div>';
  });
  body.innerHTML = html;
}

function renderContent(text, isChecklist) {
  // **굵게** 처리
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 줄바꿈 처리
  var lines = text.split("\n").filter(function(l){ return l.trim(); });
  var listClass = isChecklist ? " checklist" : "";
  var inList = false;
  var html = "";

  lines.forEach(function(line) {
    var l = line.trim();
    if (!l) return;
    // 리스트 항목
    if (/^[•\-·\*□]/.test(l) || /^\[/.test(l)) {
      if (!inList) { html += '<ul class="'+listClass+'">'; inList=true; }
      html += '<li>' + l.replace(/^[•\-·\*□]\s*/, "") + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList=false; }
      html += '<p>' + l + '</p>';
    }
  });
  if (inList) html += '</ul>';
  return html;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function setDot(s,m){ document.getElementById("dot").className="dot "+s; document.getElementById("apiMsg").textContent=m; }
function showErr(h){ var e=document.getElementById("errBox"); e.innerHTML=h; e.classList.add("show"); }
function copyResult(){
  if (!lastText) return;
  navigator.clipboard.writeText(lastText)
    .then(function(){ alert("복사되었습니다."); })
    .catch(function(){ alert("텍스트를 직접 선택해 복사하세요."); });
}
</script>
</body>
</html>
